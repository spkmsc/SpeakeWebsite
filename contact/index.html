<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; font-src 'self'; connect-src https://formspree.io; script-src 'unsafe-inline'; manifest-src 'none';">
  <meta name="referrer" content="no-referrer">
  <title>Contact — Speake</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='white'/></svg>">
  <style>
    html {
      overflow-y: scroll;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TW Cen MT', 'Century Gothic', Futura, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 640px;
      padding: 8px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid #333;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .link-item:hover {
      border-color: #fff;
      background-color: #111;
    }

    .link-item .link-label {
      font-weight: 600;
    }

    .link-item .link-arrow {
      font-size: 1rem;
      color: #666;
      transition: color 0.2s;
    }

    .link-item:hover .link-arrow {
      color: #fff;
    }

    .contact-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .contact-form label {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 4px;
      display: block;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      background-color: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #fff;
    }

    .contact-form textarea {
      min-height: 120px;
    }

    .contact-form button {
      width: 100%;
      background-color: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 16px 20px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .contact-form button:hover {
      border-color: #fff;
      background-color: #111;
    }

    .artist-info {
      margin-bottom: -28px;
    }

    .artist-name {
      font-size: clamp(3rem, calc((100vw - 48px) / 3.9), 9.5rem);
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      width: 100%;
      text-align: center;
    }

    .section-title {
      font-size: clamp(0.85rem, 3vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      align-self: flex-start;
      margin-bottom: -24px;
    }

    .form-success {
      font-size: clamp(0.9rem, 3vw, 1rem);
      color: #bbb;
      letter-spacing: 0.06em;
    }

    footer {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: auto;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="artist-info">
      <h1 class="artist-name">Speake</h1>
    </div>

    <a href="/" class="link-item">
      <span class="link-label">&#8592; Back</span>
    </a>

    <h2 class="section-title">Contact</h2>

    <form class="contact-form" id="contact-form">
      <div>
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div>
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit">
        <span>Send Message</span>
        <span>&#8599;</span>
      </button>
    </form>

    <p class="form-success" id="form-success" style="display:none;">Message sent.</p>

    <script>
      const form = document.getElementById('contact-form');
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const data = new FormData(form);
        const response = await fetch('https://formspree.io/f/xgodopzr', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          form.style.display = 'none';
          document.getElementById('form-success').style.display = 'block';
        }
      });
    </script>

  </div>

  <footer>
    &copy; 2026 Speake
  </footer>
</body>
</html>
