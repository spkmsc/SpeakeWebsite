<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'self'; manifest-src 'none';">
  <meta name="referrer" content="strict-origin">
  <title>Speake</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='white'/></svg>">
  <style>
    html {
      overflow-y: scroll;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'TW Cen MT', 'Century Gothic', Futura, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page {
      width: 100%;
      max-width: 640px;
      padding: 8px 24px 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
    }

    /* Promo image */
    .promo-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      background-color: #1a1a1a;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .promo-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Artist info */
    .artist-info {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: -28px;
    }

    .artist-name {
      font-size: clamp(3rem, calc((100vw - 48px) / 3.9), 9.5rem);
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      width: 100%;
      text-align: center;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid #333;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.2s, background-color 0.2s;
    }

    .link-item:hover {
      border-color: #fff;
      background-color: #111;
    }

    .link-item .link-label {
      font-weight: 600;
    }

    .link-item .link-arrow {
      font-size: 1rem;
      color: #666;
      transition: color 0.2s;
    }

    .link-item:hover .link-arrow {
      color: #fff;
    }

    /* Bio */
    .bio {
      font-size: clamp(0.9rem, 3vw, 1rem);
      color: #bbb;
      line-height: 1.7;
      text-align: center;
    }

    /* Mailing list */
    .mailing-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mailing-list-text {
      font-size: clamp(0.9rem, 3vw, 1rem);
      color: #bbb;
      line-height: 1.7;
      text-align: center;
    }

    .mailing-list input[type="email"] {
      width: 100%;
      background-color: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .mailing-list input[type="email"]:focus {
      border-color: #fff;
    }

    .mailing-list button {
      width: 100%;
      background-color: #000;
      color: #fff;
      border: 1px solid #333;
      padding: 16px 20px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, background-color 0.2s;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mailing-list button:hover {
      border-color: #fff;
      background-color: #111;
    }

    /* Footer */
    footer {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.08em;
      text-align: center;
      margin-top: auto;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="artist-info">
      <h1 class="artist-name">Speake</h1>
    </div>

    <div class="promo-image">
      <img src="promo.jpg" alt="Speake">
    </div>

    <nav class="links">
      <a href="https://speakemusic.bandcamp.com" class="link-item" target="_blank" rel="noopener">
        <span class="link-label">Bandcamp</span>
        <span class="link-arrow">&#8599;</span>
      </a>
      <a href="/contact" class="link-item">
        <span class="link-label">Contact</span>
        <span class="link-arrow">&#8599;</span>
      </a>
    </nav>

    <form class="mailing-list" action="https://buttondown.com/api/emails/embed-subscribe/speakemusic" method="post">
      <p class="mailing-list-text">Sign up to hear about music, live shows, experiments.</p>
      <input type="email" name="email" id="mailing-email" placeholder="Your email address">
      <button type="submit">
        <span>Subscribe</span>
        <span>&#8599;</span>
      </button>
    </form>

  </div>

  <footer>
    &copy; 2026 Speake
  </footer>
</body>
</html>
